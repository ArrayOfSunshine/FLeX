name: Split FLeX monolith

on:
  workflow_dispatch:
  push:
    branches:
      - test/split-assets-restructure
    paths:
      - tools/split.py
      - .github/workflows/split-assets.yml

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: test/split-assets-restructure

      - name: Run split-assets migration
        run: python3 tools/split.py

      - name: Commit generated split assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html service-worker.js README_RESTRUCTURE.md assets/css assets/js assets/images/milestones
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Split monolithic index into static assets"
            git push origin HEAD:test/split-assets-restructure
          fi
